<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>
      PrintForge | Premium 3D Printing Marketplace & Custom STL Service
    </title>

    <!-- SEO -->
    <meta
      name="description"
      content="PrintForge offers premium 3D printing services, custom STL printing, lithophanes, prototypes, miniatures, and marketplace products with secure UPI checkout."
    />

    <meta
      name="keywords"
      content="3D printing, STL printing, custom STL service, lithophane printing, PLA printing, ABS printing, resin printing, 3D marketplace, prototypes, miniatures"
    />

    <meta name="author" content="PrintForge" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />

    <!-- Canonical -->
    <link rel="canonical" href="https://printforge.space/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Sitemap -->
    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="/sitemap.xml"
    />

    <!-- Open Graph / Facebook -->
    <meta
      property="og:title"
      content="PrintForge | Premium 3D Printing Marketplace"
    />

    <meta
      property="og:description"
      content="Upload STL files, order custom 3D prints, shop premium models, and get instant quotes with secure checkout."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://printforge.space/" />
    <meta property="og:site_name" content="PrintForge" />
    <meta property="og:image" content="https://printforge.space/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PrintForge" />
    <meta
      name="twitter:description"
      content="Premium 3D printing marketplace and custom STL printing service."
    />
    <meta
      name="twitter:image"
      content="https://printforge.space/preview.png"
    />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
